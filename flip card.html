<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            width: 800px;
            height: 600px;
            border: 1px solid;
            margin: 100px 0px 0px 350px;
            display: flex;
        }

        #s {
            width: 300px;
            height: 600px;
            border: none;
            background-color: blue;
            position: relative;
        }

        #b {
            width: 500px;
            height: 600px;
            background-color: white;
            border: none;
            position: relative;
        }

        input {
            width: 450px;
            height: 30px;
            border: none;
            border-bottom: 2px solid rgba(6, 6, 138, 0.9);
            margin: 0px 20px 10px 20px;
            outline: none;
            color: rgb(67, 67, 67);
            font-weight: 100px;

        }

        button {
            width: 455px;
            height: 40px;
            margin-left: 20px;
            background-color: rgb(255, 115, 0);
            border: none;
            font-family: Arial;
            color: white;
            font-weight: bold;
            cursor: pointer
        }

        #f {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 250px;
            font-family: Arial;
            color: blue;

        }

        img {
            width: 300px;
            height: 200px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="clild" id="s">
            <h2 style="color: white; margin: 45px; font-family: Arial;">Login</h2>
            <h5 style="color: rgb(204, 216, 233); margin: -30px 0px 0px 45px;font-family: Arial ;">Get
                access to your
                Orders,<br>Wishilst and
                Recommendation</h5>
            <img src="./Flipimg.png" alt="">
        </div>
        <div class="clild" id="b">
            <h5 style="margin: 40px 0px 0px 20px; font-family: Arial; color: gray ;">Enter
                Email/Mobile number</h5>
            <input type="text"> <br>
            <p style="margin-left:20px; font-family:Arial; color:gray; font-size: 13px;">
                By continuing, you agree to Flipkart's
                <span style="color:blue;">Terms of Use</span>
                and
                <span style="color:blue;">Privacy Policy.</span>
            </p>
            <button>Requset OTP</button>
            <h5 id="f">New to Flipkart? Create an account</h5>
        </div>
    </div>
</body>

</html>
